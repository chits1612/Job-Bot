name: Naukri Job Bot

on:
  schedule:
    - cron: "0 9 * * *"
    - cron: "0 13 * * *"

  workflow_dispatch:

jobs:
  run-bot:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "18"

      - name: Install Dependencies
        run: npm install

      - name: Run Bot
        run: node bot.js